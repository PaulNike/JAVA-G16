spring.application.name=reniec-security-jwt-roles

# ===================== PostgreSQL =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/reniec_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.data.jdbc.dialect=postgresql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================== Redis =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
reniec.cache.ttl-segundos=3600

# ============== API externa RENIEC (decolecta) ==============
reniec.api.url=https://api.decolecta.com
reniec.api.token=xxxxxxxxxxxxxxxxxxxxxxxxxxx

# ============== Seguridad ==============
# Los usuarios de este proyecto NO van aqui: estan definidos en codigo,
# en la clase SecurityConfig (usuarios en memoria). En el Proyecto 2/3
# los moveremos a la base de datos.

# ============== JWT ==============
# Clave secreta (base64) con la que se FIRMAN los tokens. Es el "sello"
# que nadie puede falsificar sin conocerla. En produccion va por variable
# de entorno, nunca en el repositorio. Cambien esta por la suya.
security.jwt.secret=fKA8rgbgEDmvVbo8U//rv+gp5rhnfy4v6GYhRLdG11ZhzGnm+aoLLDDQrCsLZjTwoXq43/CTG/P2L2SFmQQ9pQ==
# Cuanto vive el token, en milisegundos. 900000 = 15 minutos.
# A proposito es corto: si te roban el token, caduca rapido.
security.jwt.expiration-ms=900000
