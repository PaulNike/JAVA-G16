spring.application.name=reniec-security

# ===================== PostgreSQL =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/reniec_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.data.jdbc.dialect=postgresql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===================== Redis =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
reniec.cache.ttl-segundos=3600

# ============== API externa RENIEC (decolecta) ==============
reniec.api.url=https://api.decolecta.com
reniec.api.token=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ============== Seguridad ==============
# Los usuarios de este proyecto NO van aqui: estan definidos en codigo,
# en la clase SecurityConfig (usuarios en memoria). En el Proyecto 2/3
# los moveremos a la base de datos.
logging.level.root=debug
