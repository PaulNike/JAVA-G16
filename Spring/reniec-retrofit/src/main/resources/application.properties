spring.application.name=reniec-retrofit

# ===================== PostgreSQL =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/reniec_db
spring.datasource.username=postgres
spring.datasource.password=postgres
# 'update' crea/actualiza las tablas solo. En produccion usariamos Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================== Redis =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Tiempo de vida del cache en segundos (3600 = 1 hora)
reniec.cache.ttl-segundos=3600

# ============== API externa RENIEC (decolecta) ==============
reniec.api.url=https://api.decolecta.com
# Aqui va SU token. Recuerden no subirlo nunca al repositorio.
reniec.api.token=PON_AQUI_TU_TOKEN
